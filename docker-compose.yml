version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    volumes:
      - ./productos.json:/app/productos.json:ro
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
