server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS — resolves service names lazily (prevents startup failure
    # when the api container is not yet available)
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://api:5001;

    location /api/ {
        proxy_pass         $api_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass         $api_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
