name: Actualizar catálogo Aura Sole

on:
  schedule:
    # 06:00 UTC = 12:00am hora México Centro (CST UTC-6)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Ejecutar scraper
        run: python scraper.py
        working-directory: aura-sole

      - name: Regenerar index.html
        run: python generar_html.py
        working-directory: aura-sole

      - name: Publicar cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aura-sole/productos.json aura-sole/index.html
          if git diff --cached --quiet; then
            echo "Sin cambios en productos.json; regenerando HTML igualmente."
            git add aura-sole/index.html
          fi
          git diff --cached --quiet || git commit -m "chore: actualizar catálogo $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
