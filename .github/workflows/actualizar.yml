name: Actualizar catálogo Aura Sole

on:
  schedule:
    # 06:00 UTC = 12:00am hora México Centro (CST UTC-6)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 flask flask-cors

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Regenerar index.html
        run: python generar_html.py

      - name: Publicar cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add productos.json index.html
          git diff --cached --quiet || git commit -m "chore: actualizar catálogo $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
